services:
  semantic-search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-search-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - CACHE_SIMILARITY_THRESHOLD=0.60
      - CACHE_MAX_SIZE=10000
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
